<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link rel="stylesheet" href="index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-HK5fgLBL+xU5C8g3R0j7dXYZ..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
:root{
  --bg-card:#ffffffd3;
  --text-color:#222;
  --subtext:#666;
}

body.dark{
  --bg-card:#e10b0bb3;
  --text-color:#f9fafb;
  --subtext:#d1d5db;
}

/* Reset */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

/* Video Background */
.video-bg{
  position:fixed;
  inset:0;
  z-index:-2;
}
.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:-1;
}

/* Toggle */
.theme-toggle{
  position:fixed;
  top:20px;
  right:25px;
  background:#28a745;
  color:#fff;
  border-radius:30px;
  padding:10px 18px;
  cursor:pointer;
  transition:.4s;
}
.theme-toggle:hover{
  transform:scale(1.1);
}

/* Welcome Box */
.welcome-section{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.welcome-card{
  background:var(--bg-card);
  color:var(--text-color);
  padding:60px;
  border-radius:30px;
  max-width:650px;
  box-shadow:0 40px 90px rgba(0,0,0,.4);
  animation:zoomFade 1.3s ease;
}

.welcome-card h1{
  font-size:52px;
  font-weight:800;
}
.welcome-card span{
  background:linear-gradient(45deg,#28a745,#20c997);
  -webkit-background-clip:text;
  color:transparent;
}

.welcome-card p{
  font-size:18px;
  color:var(--subtext);
  margin:20px 0 30px;
}

/* Icons */
.icons i{
  font-size:42px;
  color:#28a745;
  margin:0 15px;
  animation:bounce 2s infinite;
}
.icons i:nth-child(2){animation-delay:.3s;}
.icons i:nth-child(3){animation-delay:.6s;}

/* Button */
.btn-start{
  padding:14px 40px;
  font-size:18px;
  border-radius:30px;
  transition:.4s;
}
.btn-start:hover{
  transform:scale(1.15);
  box-shadow:0 12px 35px rgba(40,167,69,.6);
}

/* Animations */
@keyframes zoomFade{
  from{opacity:0;transform:scale(.8);}
  to{opacity:1;transform:scale(1);}
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}
</style>
</head>
<body>
    

<!-- Video Background -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="images/58186-487176806_medium.mp4" type="video/mp4">
  </video>
</div>
<div class="overlay"></div>

<!-- Dark/Light Toggle -->
<div class="theme-toggle" id="themeToggle">
  <i class="fa-solid fa-moon"></i>
</div>

<section class="welcome-section">
  <div class="welcome-card">
    <h1>
      Welcome to <br>
      <span>Fresh & Organic</span>
    </h1>

    <p>
      Pure fruits & vegetables straight from farms,  
      healthy, natural and full of life.
    </p>

    <div class="icons mb-4">
      <i class="fa-solid fa-apple-whole"></i>
      <i class="fa-solid fa-carrot"></i>
      <i class="fa-solid fa-leaf"></i>
    </div>

    <a href="index.html" class="btn btn-success btn-start">
      Start Shopping
    </a>
  </div>
</section>


       <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
   
        <!-- <script src="script.js"></script> -->
<script>
const toggle = document.getElementById("themeToggle");
toggle.addEventListener("click",()=>{
  document.body.classList.toggle("dark");
  toggle.innerHTML = document.body.classList.contains("dark")
    ? '<i class="fa-solid fa-sun"></i>'
    : '<i class="fa-solid fa-moon"></i>';
});
</script>

</body>
</html>

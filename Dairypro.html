<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link rel="stylesheet" href="index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-HK5fgLBL+xU5C8g3R0j7dXYZ..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
body{
  background:linear-gradient(135deg,#f8fbff,#eef3ff);
  font-family:'Poppins',sans-serif;
}

/* Title */
.section-title{
  font-size:48px;
  font-weight:800;
}
.section-title span{
 background:linear-gradient(45deg,#28a745,#20c997);
  -webkit-background-clip:text;
  color:transparent;
}

/* Card */
.dairy-card{
  position:relative;
  border-radius:26px;
  overflow:hidden;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(14px);
  box-shadow:0 22px 60px rgba(0,0,0,.15);
  transition:all .85s cubic-bezier(.19,1,.22,1);
  animation:fadeUp 1.2s ease both;
}
.dairy-card:hover{
  transform:translateY(-20px) scale(1.06) rotateX(5deg);
  box-shadow:0 40px 90px rgba(59,130,246,.35);
}

/* Image */
.dairy-card img{
  height:260px;
  width:100%;
  object-fit:cover;
  transition:transform .9s ease;
}
.dairy-card:hover img{
  transform:scale(1.25) rotate(2deg);
}

/* Overlay */
.dairy-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
  opacity:0;
  transition:.6s ease;
}
.dairy-card:hover .dairy-overlay{
  opacity:1;
}

/* Info */
.dairy-info{
  position:absolute;
  bottom:-90px;
  width:100%;
  color:#fff;
  text-align:center;
  padding:22px;
  transition:.6s ease;
}
.dairy-card:hover .dairy-info{
  bottom:0;
}

/* Badge */
.dairy-badge{
  position:absolute;
  top:18px;
  left:18px;
background:linear-gradient(45deg,#28a745,#20c997);
  color:#fff;
  padding:7px 18px;
  border-radius:30px;
  font-size:13px;
  animation:float 3s ease-in-out infinite;
  z-index:2;
}

/* Shine */
.dairy-card::after{
  content:'';
  position:absolute;
  inset:-100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.45),transparent);
  transform:translateX(-100%);
}
.dairy-card:hover::after{
  animation:shine 1.3s;
}

/* Animations */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(70px);}
  to{opacity:1;transform:none;}
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
@keyframes shine{
  to{transform:translateX(100%);}
}
</style>
</head>
<body>
   
    <section class="py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="section-title">Fresh <span>Dairy Products</span></h1>
      <p class="text-muted fs-5">
        Pure, creamy & farm-fresh goodness
      </p>
    </div>

    <div class="row g-4">

      <!-- Milk -->
      <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Pure</span>
          <img src="images/milk.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Fresh Milk</h5>
            <p>₹60 / litre</p>
          </div>
        </div>
      </div>

      <!-- Cheese -->
      <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Premium</span>
          <img src="images/cheese.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Cheese</h5>
            <p>₹350 / pack</p>
          </div>
        </div>
      </div>
            <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Healthy</span>
          <img src="images/curd.avif">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Curd</h5>
            <p>₹80 / cup</p>
          </div>
        </div>
      </div>

       <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Premium</span>
          <img src="images/egg.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Egg</h5>
            <p>₹350 / pack</p>
          </div>
        </div>
      </div>
           <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Healthy</span>
          <img src="images/Flavered milk.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Flavered Milk</h5>
            <p>₹80 / cup</p>
          </div>
        </div>
      </div>
      <!-- Butter -->
      <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Creamy</span>
          <img src="images/butter.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Butter</h5>
            <p>₹220 / pack</p>
          </div>
        </div>
      </div>

      <!-- Yogurt -->
      <div class="col-md-6 col-lg-3">
        <div class="dairy-card">
          <span class="dairy-badge">Healthy</span>
          <img src="images/yougurt.jpg">
          <div class="dairy-overlay"></div>
          <div class="dairy-info">
            <h5>Yogurt</h5>
            <p>₹80 / cup</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-HK5fgLBL+xU5C8g3R0j7dXYZ..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      body{
        background:linear-gradient(120deg,#f6fff8,#87e7b1);
      }
        /* fruits and vegetable page */
.section-title {
  font-size: 40px;
  font-weight: bold;
}

.section-title span {
  color: #28a745;
}

/* Card */
.product-card {
  position: relative;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  transition: all 0.5s ease;
  animation: fadeUp 1s ease;
}

.product-card:hover {
  transform: translateY(-12px) scale(1.03);
}

/* Image */
.product-card img {
  height: 230px;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.product-card:hover img {
  transform: scale(1.15);
}

/* Overlay info */
.product-info {
  position: absolute;
  bottom: -60px;
  width: 100%;
  background: rgba(40, 167, 69, 0.9);
  color: #fff;
  text-align: center;
  padding: 15px;
  transition: 0.5s ease;
}

.product-card:hover .product-info {
  bottom: 0;
}

/* Badge */
.badge-tag {
  position: absolute;
  top: 15px;
  left: 15px;
  background: #28a745;
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 2;
  animation: float 3s ease-in-out infinite;
}

/* Animations */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
    </style>
</head>
<body>



<section class="py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="section-title">
        Fresh <span>Fruits & Vegetables</span>

    <div class="row g-4">

        </div>
      </div>

      <div class="col-md-6 col-lg-3">

        </div>
      </div>

       <div class="col-md-6 col-lg-3">

        </div>
      </div>

       <div class="col-md-6 col-lg-3">

          <span class="badge-tag">Fresh</span>
          <img src="images/guava.jpg" class="w-100" alt="Tomato">
          <div class="product-info">
            <h5>Guava</h5>
            <p>₹40 / kg</p>
          </div>
        </div>
      </div>

       <div class="col-md-6 col-lg-3">
        <div class="product-card">
          <span class="badge-tag">Organic</span>
          <img src="images/vegetable.jpg" class="w-100" alt="Tomato">

            <h5>vegetables</h5>

      </div>

       <div class="col-md-6 col-lg-3">

    </div>
